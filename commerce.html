<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>3 BROTHERS | COMMERCE DYNAMIQUE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gta-green: #46a046; --gta-bg: #050505; --gta-card: #111; --gta-border: #222; --gta-red: #cc2222; }
        body { background: var(--gta-bg); color: #fff; font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin: 0; font-size: 0.72em; }
        .navbar { background: #000; border-bottom: 3px solid var(--gta-green); display: flex; padding: 10px 20px; gap: 20px; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-link { color: #888; text-decoration: none; font-size: 1.1em; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--gta-green); }
        .cash-display { margin-left: auto; color: var(--gta-green); font-size: 1.5em; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .gta-card { background: var(--gta-card); border: 1px solid var(--gta-border); border-left: 4px solid var(--gta-green); padding: 20px; margin-bottom: 20px; }
        h3 { color: var(--gta-green); font-style: italic; margin: 0 0 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        label { display: block; color: #666; margin-bottom: 5px; font-size: 0.75em; }
        select, input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; font-family: 'Arial Black', sans-serif; }
        .gta-btn { background: #222; color: #fff; border: 1px solid #333; padding: 12px; width: 100%; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .gta-btn:hover { background: var(--gta-green); color: #000; border-color: var(--gta-green); }
        .preview-box { background: #080808; border: 1px solid #1a1a1a; padding: 10px; margin-top: 5px; font-family: sans-serif; text-transform: none; }
        .preview-line { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 0.85em; }
        .gain { color: var(--gta-green); font-weight: bold; }
        .perte { color: var(--gta-red); font-weight: bold; }
        .unit-input { width: 30% !important; display: inline-block; margin-left: 10px; border-color: var(--gta-green); color: var(--gta-green); }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-style: italic; font-size: 1.2em; margin-right: 20px; color: var(--gta-green);">3 BROTHERS HQ</div>
    <a href="mainframe.html" class="nav-link">FLUX</a>
    <a href="stock.html" class="nav-link">STOCKS</a>
    <a href="commerce.html" class="nav-link active">COMMERCE</a>
    <a href="historique.html" class="nav-link">HISTORIQUE</a>
    <div class="cash-display" id="cash-top">0 $</div>
</nav>

<div class="container">
    <div class="grid">
        
        <!-- VENTE DIRECTE -->
        <div class="gta-card">
            <h3>💰 VENTE MARCHANDISE</h3>
            <label>PRODUIT / PRIX UNITAIRE ($) :</label>
            <div style="display:flex; gap:10px;">
                <select id="sale-item" onchange="updatePreviews()">
                    <option value="Pochon de Weed">POCHON DE WEED</option>
                    <option value="Pochon de Meth">POCHON DE METH</option>
                    <option value="Pochon de Coke">POCHON DE COKE</option>
                </select>
                <input type="number" id="sale-unit-p" value="20" class="unit-input" oninput="updatePreviews()">
            </div>
            <label>QUANTITÉ :</label>
            <input type="number" id="sale-qty" placeholder="0" oninput="updatePreviews()">
            
            <div class="preview-box">
                <div class="preview-line"><span>Impact Stock :</span> <span id="v-stock" class="perte">--</span></div>
                <div class="preview-line"><span>Total Encaissé :</span> <span id="v-cash" class="gain">--</span></div>
            </div>
            <button class="gta-btn" style="margin-top:10px" onclick="processSale()">VALIDER LA VENTE</button>
        </div>

        <div>
            <!-- RACHAT -->
            <div class="gta-card" style="border-left-color: #881111;">
                <h3>📥 RACHAT MATIÈRE (TÊTES)</h3>
                <label>NB TÊTES / PRIX UNITAIRE ($) :</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="buyback-qty" placeholder="0" oninput="updatePreviews()">
                    <input type="number" id="buyback-unit-p" value="6" class="unit-input" oninput="updatePreviews()">
                </div>
                <div class="preview-box">
                    <div class="preview-line"><span>Coût Total :</span> <span id="r-cash" class="perte">--</span></div>
                </div>
                <button class="gta-btn" style="background:#300; margin-top:10px" onclick="processBuyback()">PAYER LE FOURNISSEUR</button>
            </div>

            <!-- TRAITEMENT -->
            <div class="gta-card" style="border-left-color: #ff9900;">
                <h3>🧪 SERVICE TRAITEMENT</h3>
                <label>TÊTES CLIENT / PRIX PAR POCHON ($) :</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="service-tetes" placeholder="0" oninput="updatePreviews()">
                    <input type="number" id="service-unit-p" value="5" class="unit-input" oninput="updatePreviews()">
                </div>
                <div class="preview-box">
                    <div class="preview-line"><span>Pochons à donner :</span> <span id="s-prod" class="gain">--</span></div>
                    <div class="preview-line"><span>Facture Service :</span> <span id="s-cash" class="gain">--</span></div>
                </div>
                <button class="gta-btn" style="background:#320; margin-top:10px" onclick="processService()">FACTURER LE SERVICE</button>
            </div>
        </div>

    </div>
</div>

<script>
    const client = supabase.createClient("https://pbcnioihtzgytunkizbi.supabase.co", "sb_publishable_zbH8z6RmfayN8nbsu-99bg_vpRVe0n_");

    function updatePreviews() {
        // Vente
        const vQty = document.getElementById('sale-qty').value || 0;
        const vUnit = document.getElementById('sale-unit-p').value || 0;
        document.getElementById('v-stock').innerText = `-${vQty} unités`;
        document.getElementById('v-cash').innerText = `+${vQty * vUnit} $`;

        // Rachat
        const rQty = document.getElementById('buyback-qty').value || 0;
        const rUnit = document.getElementById('buyback-unit-p').value || 0;
        document.getElementById('r-cash').innerText = `-${rQty * rUnit} $`;

        // Service
        const sTetes = document.getElementById('service-tetes').value || 0;
        const sUnit = document.getElementById('service-unit-p').value || 0;
        const sPochons = Math.floor(sTetes / 2);
        document.getElementById('s-prod').innerText = `${sPochons} unités`;
        document.getElementById('s-cash').innerText = `+${sPochons * sUnit} $`;
    }

    async function updateCash() {
        const { data } = await client.from('stocks').select('quantity').eq('name', 'Cash').single();
        if(data) document.getElementById('cash-top').innerText = data.quantity.toLocaleString() + " $";
        updatePreviews();
    }

    async function processSale() {
        const item = document.getElementById('sale-item').value;
        const qty = parseInt(document.getElementById('sale-qty').value);
        const unit = parseInt(document.getElementById('sale-unit-p').value);
        if(!qty || !unit) return;
        const total = qty * unit;
        const { data: st } = await client.from('stocks').select('*');
        const prod = st.find(i => i.name === item);
        if(!prod || prod.quantity < qty) return alert("STOCK INSUFFISANT");
        await client.from('stocks').update({ quantity: prod.quantity - qty }).eq('name', item);
        await client.from('stocks').update({ quantity: st.find(i => i.name === 'Cash').quantity + total }).eq('name', 'Cash');
        await client.from('logs').insert([{ action: 'VENTE', details: `${qty}x ${item}`, montant: total }]);
        location.reload();
    }

    async function processBuyback() {
        const qty = parseInt(document.getElementById('buyback-qty').value);
        const unit = parseInt(document.getElementById('buyback-unit-p').value);
        if(!qty || !unit) return;
        const total = qty * unit;
        const { data: st } = await client.from('stocks').select('*');
        const cash = st.find(i => i.name === 'Cash');
        if(cash.quantity < total) return alert("CASH INSUFFISANT");
        const tetes = st.find(i => i.name === 'Tête de weed');
        await client.from('stocks').update({ quantity: cash.quantity - total }).eq('name', 'Cash');
        await client.from('stocks').update({ quantity: (tetes?.quantity || 0) + qty }).eq('name', 'Tête de weed');
        await client.from('logs').insert([{ action: 'RACHAT', details: `${qty} Têtes`, montant: -total }]);
        location.reload();
    }

    async function processService() {
        const tetes = parseInt(document.getElementById('service-tetes').value);
        const unit = parseInt(document.getElementById('service-unit-p').value);
        if(!tetes || tetes < 2) return;
        const nbP = Math.floor(tetes / 2);
        const total = nbP * unit;
        const { data: st } = await client.from('stocks').select('*');
        const vides = st.find(i => i.name === 'Pochon vide');
        if(!vides || vides.quantity < nbP) return alert("MANQUE DE POCHONS VIDES");
        await client.from('stocks').update({ quantity: vides.quantity - nbP }).eq('name', 'Pochon vide');
        await client.from('stocks').update({ quantity: st.find(i => i.name === 'Cash').quantity + total }).eq('name', 'Cash');
        await client.from('logs').insert([{ action: 'SERVICE', details: `Traitement ${nbP} pochons`, montant: total }]);
        alert("SERVICE VALIDÉ");
        location.reload();
    }

    window.onload = updateCash;
</script>
</body>
</html>
