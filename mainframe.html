<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>3 BROTHERS | MAINFRAME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gta-green: #46a046; --gta-bg: #050505; --gta-card: #111; 
            --gta-border: #222; --gta-text: #fff; --gta-btn-grey: #333; --gta-red: #881111;
        }
        body { background: var(--gta-bg); color: var(--gta-text); font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin: 0; font-size: 0.72em; }
        
        /* Navigation */
        .navbar { background: #000; border-bottom: 3px solid var(--gta-green); display: flex; padding: 10px 20px; gap: 20px; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-link { color: #888; text-decoration: none; font-size: 1.1em; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--gta-green); }
        .cash-display { margin-left: auto; color: var(--gta-green); font-size: 1.5em; letter-spacing: 1px; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }
        
        /* Cards */
        .gta-card { background: var(--gta-card); border: 1px solid var(--gta-border); border-left: 4px solid var(--gta-green); padding: 15px; margin-bottom: 15px; }
        h3 { color: var(--gta-green); font-style: italic; margin: 0 0 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        /* Flux de commandes */
        .order-item { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .chat-box { height: 120px; overflow-y: auto; background: #000; padding: 10px; margin: 10px 0; display: flex; flex-direction: column; gap: 5px; border: 1px solid #222; }
        .msg { padding: 4px 8px; border-radius: 3px; max-width: 85%; font-size: 0.9em; text-transform: none; font-family: sans-serif; }
        .msg.admin { background: var(--gta-green); color: #000; align-self: flex-end; }
        .msg.gang { background: #222; color: #fff; align-self: flex-start; }

        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 5px; }
        .gta-btn { background: var(--gta-btn-grey); color: #fff; border: none; padding: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .gta-btn:hover { background: var(--gta-green); color: #000; }
        .btn-red { background: #441111; }
        .btn-red:hover { background: var(--gta-red); }
        
        .key-box { background: #000; border: 1px dashed var(--gta-green); padding: 15px; text-align: center; color: var(--gta-green); font-size: 1.4em; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-style: italic; font-size: 1.2em; margin-right: 20px; color: var(--gta-green);">3 BROTHERS HQ</div>
    <a href="mainframe.html" class="nav-link active">FLUX</a>
    <a href="stock.html" class="nav-link">STOCKS</a>
    <a href="commerce.html" class="nav-link">COMMERCE</a>
    <a href="historique.html" class="nav-link">HISTORIQUE</a>
    <div class="cash-display" id="cash">0 $</div>
</nav>

<div class="container">
    <div class="grid">
        <!-- COLONNE GAUCHE : FLUX DE COMMANDES -->
        <div>
            <div class="gta-card">
                <h3>📡 TRANSMISSIONS EN DIRECT</h3>
                <div id="order-list">SYNCHRONISATION DES SYSTÈMES...</div>
            </div>
        </div>

        <!-- COLONNE DROITE : OUTILS -->
        <div>
            <div class="gta-card">
                <h3>🔐 GÉNÉRATEUR D'INVITATIONS</h3>
                <p style="font-size:0.8em; color:#666;">CRÉER UNE CLÉ POUR UN NOUVEAU GANG.</p>
                <button class="gta-btn" style="width:100%" onclick="generateNewInvite()">GÉNÉRER CLÉ UNIQUE</button>
                <div id="key-result" class="key-box" onclick="copyKey()">---- ---- ----</div>
            </div>

            <div class="gta-card">
                <h3>📊 STATISTIQUES RÉSEAU</h3>
                <div id="quick-stats" style="line-height: 2;">
                    COMMANDES : <span id="stat-count" style="color:var(--gta-green)">0</span><br>
                    POCHONS : <span id="stat-weed" style="color:var(--gta-green)">0</span><br>
                    TÊTES : <span id="stat-tetes" style="color:var(--gta-green)">0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const client = supabase.createClient("https://pbcnioihtzgytunkizbi.supabase.co", "sb_publishable_zbH8z6RmfayN8nbsu-99bg_vpRVe0n_");

    // Sécurité d'accès
    if (sessionStorage.getItem('adminAccess') !== 'true') {
        window.location.href = "index.html";
    }

    async function refreshHQ() {
        fetchOrders();
        updateGlobalStats();
    }

    async function updateGlobalStats() {
        const { data: st } = await client.from('stocks').select('*');
        const { count } = await client.from('commandes').select('*', { count: 'exact' });
        
        document.getElementById('stat-count').innerText = count || 0;
        
        st?.forEach(s => {
            if(s.name === "Cash") document.getElementById('cash').innerText = s.quantity.toLocaleString() + " $";
            if(s.name === "Pochon de Weed") document.getElementById('stat-weed').innerText = s.quantity;
            if(s.name === "Tête de Weed") document.getElementById('stat-tetes').innerText = s.quantity;
        });
    }

    async function fetchOrders() {
        const { data: ords } = await client.from('commandes').select('*').order('created_at', {ascending: false});
        let html = "";
        
        for (let o of ords || []) {
            const { data: msgs } = await client.from('messages').select('*').eq('commande_id', o.id).order('created_at', {ascending: true});
            
            html += `
            <div class="order-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:1.3em; color:var(--gta-green); font-style:italic;">${o.nom_gang}</span>
                    <span style="background:#222; padding:3px 10px; border:1px solid #333;">${o.prix_total} $</span>
                </div>
                <div style="margin:5px 0; color:#888;">CONTENU : <b style="color:#ccc;">${o.details}</b> | STATUT : <b style="color:var(--gta-green);">${o.statut}</b></div>
                
                <div class="chat-box">
                    ${msgs?.map(m => `<div class="msg ${m.expediteur === 'ADMIN' ? 'admin' : 'gang'}">${m.texte}</div>`).join('')}
                </div>
                
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="in-${o.id}" placeholder="RÉPONDRE AU GANG...">
                    <button class="gta-btn" style="width:80px" onclick="sendAdminMsg(${o.id})">OK</button>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                    <button class="gta-btn" onclick="updateStatut(${o.id}, 'EN PRÉPARATION')">EN PRÉP'</button>
                    <button class="gta-btn" onclick="updateStatut(${o.id}, 'PRÊT')">PRÊT</button>
                    <button class="gta-btn btn-red" onclick="finishOrder(${o.id}, '${o.nom_gang}', ${o.prix_total}, '${o.details}')">TERMINER</button>
                </div>
            </div>`;
        }
        document.getElementById('order-list').innerHTML = html || "AUCUNE TRANSMISSION EN COURS";
    }

    async function sendAdminMsg(id) {
        const t = document.getElementById(`in-${id}`).value;
        if(!t) return;
        await client.from('messages').insert([{ commande_id: id, expediteur: 'ADMIN', texte: t }]);
        document.getElementById(`in-${id}`).value = "";
        fetchOrders();
    }

    async function updateStatut(id, txt) {
        await client.from('commandes').update({ statut: txt }).eq('id', id);
        fetchHQ();
    }

    async function finishOrder(id, gang, prix, details) {
        if(!confirm("LIVRAISON TERMINÉE ? L'ARGENT SERA ENCAISSÉ.")) return;
        
        // 1. Archivage dans l'historique (logs)
        await client.from('logs').insert([{ action: 'VENTE GANG', nom_gang: gang, montant: prix, details: details }]);
        
        // 2. Encaissement du Cash
        const { data: c } = await client.from('stocks').select('quantity').eq('name', 'Cash').single();
        await client.from('stocks').update({ quantity: (c?.quantity || 0) + prix }).eq('name', 'Cash');
        
        // 3. Nettoyage (suppression commande)
        await client.from('commandes').delete().eq('id', id);
        refreshHQ();
    }

    // GESTION DES CLÉS
    async function generateNewInvite() {
        const key = Math.random().toString(36).substring(2,6).toUpperCase() + "-" + Math.random().toString(36).substring(2,6).toUpperCase() + "-" + Math.random().toString(36).substring(2,6).toUpperCase();
        
        const { error } = await client.from('invitations').insert([{ code: key, utilise: false }]);
        
        if(!error) {
            document.getElementById('key-result').innerText = key;
        }
    }

    function copyKey() {
        const k = document.getElementById('key-result').innerText;
        if(k !== "---- ---- ----") {
            navigator.clipboard.writeText(k);
            alert("CLÉ COPIÉE : " + k);
        }
    }

    window.onload = refreshHQ;
    setInterval(refreshHQ, 10000);
</script>
</body>
</html>
